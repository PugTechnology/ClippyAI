version: '3.8'
services:
  hivemind-watchdog:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_PAT=${GITHUB_PAT}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data # Persists the SQLite database
    restart: unless-stopped
